<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>scopy — 채용 시장 탐색 대시보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-name">scopy</span>
    </div>
    <nav class="nav" aria-label="주 메뉴">
      <button class="nav-item is-active" data-view="overview">
        <svg viewBox="0 0 20 20"><path d="M3 3h6v8H3zM11 3h6v5h-6zM11 10h6v7h-6zM3 13h6v4H3z"/></svg>
        시장 개요
      </button>
      <button class="nav-item" data-view="jobs">
        <svg viewBox="0 0 20 20"><path d="M7 5V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v1h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h3zm2-1v1h2V4H9z"/></svg>
        공고 탐색
      </button>
      <button class="nav-item" data-view="companies">
        <svg viewBox="0 0 20 20"><path d="M3 17V9h3v8H3zm5.5 0V3h3v14h-3zM14 17v-6h3v6h-3z"/></svg>
        기업 비교
      </button>
      <button class="nav-item" data-view="bookmarks">
        <svg viewBox="0 0 20 20"><path d="M5 3a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v15l-5-3.5L5 18z"/></svg>
        북마크
      </button>
    </nav>
    <div class="sidebar-foot">
      <button id="themeToggle" class="theme-toggle" aria-label="다크 모드 전환">
        <span class="theme-toggle-icon" aria-hidden="true"></span>
        <span id="themeLabel">다크 모드</span>
      </button>
      <div class="company-chip">
        <div class="company-avatar" aria-hidden="true">W</div>
        <div>
          <div class="company-name">채용 시장 데이터</div>
          <div class="company-sub">Wanted OpenAPI 연동</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <h1 class="page-title" id="pageTitle">시장 개요</h1>
        <p class="page-sub" id="pageSub">지금 채용 시장의 수요를 한눈에</p>
      </div>
      <div class="filter-row" id="filterRow" role="group" aria-label="기간 필터">
        <button class="range-btn" data-days="7">최근 7일</button>
        <button class="range-btn" data-days="30">최근 30일</button>
        <button class="range-btn is-active" data-days="90">최근 90일</button>
        <button class="range-btn" data-days="0">전체</button>
      </div>
    </header>

    <!-- 시장 개요 -->
    <section class="view is-active" id="view-overview">
      <div class="kpi-row" id="kpiRow"></div>
      <div class="grid grid-2">
        <div class="card">
          <div class="card-head">
            <div>
              <h2 class="card-title">신규 공고 추이</h2>
              <p class="card-sub" id="trendSub">주별 신규 등록 공고</p>
            </div>
            <button class="table-toggle" data-target="trend">표</button>
          </div>
          <div class="chart-body" id="chart-trend"></div>
        </div>
        <div class="card">
          <div class="card-head">
            <div>
              <h2 class="card-title">직군별 공고</h2>
              <p class="card-sub">기간 내 등록 공고 수</p>
            </div>
            <button class="table-toggle" data-target="category">표</button>
          </div>
          <div class="chart-body" id="chart-category"></div>
        </div>
      </div>
      <div class="grid grid-2">
        <div class="card">
          <div class="card-head">
            <div>
              <h2 class="card-title">스킬 수요 Top 10</h2>
              <p class="card-sub">공고에 요구된 스킬 태그 빈도</p>
            </div>
            <button class="table-toggle" data-target="skills">표</button>
          </div>
          <div class="chart-body" id="chart-skills"></div>
        </div>
        <div class="card">
          <div class="card-head">
            <div>
              <h2 class="card-title">경력대별 공고</h2>
              <p class="card-sub">최소 요구 경력 기준</p>
            </div>
            <button class="table-toggle" data-target="career">표</button>
          </div>
          <div class="chart-body" id="chart-career"></div>
        </div>
      </div>
    </section>

    <!-- 공고 탐색 -->
    <section class="view" id="view-jobs">
      <div class="card">
        <div class="card-head card-head-stack">
          <div>
            <h2 class="card-title">공고 탐색</h2>
            <p class="card-sub" id="jobCount"></p>
          </div>
          <div class="toolbar">
            <input type="search" id="jobSearch" class="search-input" placeholder="포지션·기업·스킬 검색">
            <select id="categoryFilter" class="select"><option value="">모든 직군</option></select>
            <select id="careerFilter" class="select">
              <option value="">모든 경력</option>
              <option value="new">신입 가능</option>
              <option value="junior">주니어 (~3년)</option>
              <option value="senior">시니어 (5년+)</option>
            </select>
            <select id="sortOrder" class="select">
              <option value="latest">최신순</option>
              <option value="reward">보상금순</option>
              <option value="due">마감 임박순</option>
            </select>
          </div>
        </div>
        <div class="job-grid" id="jobGrid"></div>
      </div>
    </section>

    <!-- 기업 비교 -->
    <section class="view" id="view-companies">
      <div class="grid grid-2">
        <div class="card">
          <div class="card-head">
            <div>
              <h2 class="card-title">평균연봉 Top 10</h2>
              <p class="card-sub">채용 진행 중인 기업 기준 (만원)</p>
            </div>
            <button class="table-toggle" data-target="salary">표</button>
          </div>
          <div class="chart-body" id="chart-salary"></div>
        </div>
        <div class="card">
          <div class="card-head">
            <div>
              <h2 class="card-title">채용 활발 기업 Top 10</h2>
              <p class="card-sub">진행 중 공고 수</p>
            </div>
            <button class="table-toggle" data-target="hiring">표</button>
          </div>
          <div class="chart-body" id="chart-hiring"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-head">
          <div>
            <h2 class="card-title">기업 인사이트</h2>
            <p class="card-sub">Wanted 인사이트 API 기준 — 진행 중 공고 수 순</p>
          </div>
        </div>
        <div class="table-wrap" id="companiesTable"></div>
      </div>
    </section>

    <!-- 북마크 -->
    <section class="view" id="view-bookmarks">
      <div class="card">
        <div class="card-head">
          <div>
            <h2 class="card-title">저장한 공고</h2>
            <p class="card-sub" id="bookmarkCount"></p>
          </div>
        </div>
        <div class="job-grid" id="bookmarkGrid"></div>
      </div>
    </section>
  </main>
</div>

<div class="chart-tooltip" id="tooltip" role="status" aria-live="polite" hidden></div>

<script src="js/data.js"></script>
<script src="js/charts.js"></script>
<script src="js/app.js"></script>
</body>
</html>
